apiVersion: apps/v1
kind: Deployment
metadata:
  name: proposal-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proposal-agent
  template:
    metadata:
      labels:
        app: proposal-agent
    spec:
      containers:
      - name: proposal-agent
        image: ghcr.io/REPLACE_OWNER/proposal-agent:latest
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres:5432/agents
